name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      run: pip install poetry

    - name: Install dependencies
      run: poetry install --with dev

    - name: Run unit tests with coverage
      run: |
        poetry run pytest -m unit \
          --cov=cv_builder \
          --cov-report=xml \
          --cov-report=term-missing

    - name: Run integration tests
      run: poetry run pytest -m integration -v

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.python-version == '3.11'
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  # Aggregate gate for branch protection: a single required check that
  # succeeds only when the whole test matrix passes. Branch protection
  # requires the context "tests-pass", which the matrix job cannot provide.
  tests-pass:
    name: tests-pass
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Verify test matrix succeeded
      run: |
        if [ "${{ needs.test.result }}" != "success" ]; then
          echo "Test matrix did not succeed: ${{ needs.test.result }}"
          exit 1
        fi
        echo "All test-matrix jobs passed."
