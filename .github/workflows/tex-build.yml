name: Build CV

# Rebuild CV artifacts (.tex, .pdf, .jsonresume.json) as part of PR review.
# Commits the regenerated outputs back to the PR head branch so reviewers see
# the rendered result before merging. Works with a ruleset that requires PRs
# for main — no bot push to main needed.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'data/cv.json'
      - 'cv_builder/**'
      - 'latex_requirements.txt'
      - '.github/workflows/tex-build.yml'

permissions:
  contents: write

concurrency:
  group: tex-build-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip on PRs from forks: GITHUB_TOKEN can't write to a fork's branch.
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout PR head
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Poetry
      run: pip install poetry

    - name: Install Python dependencies
      run: poetry install

    - name: Generate .tex and JSON Resume artifact
      run: poetry run cv-build

    - name: Stage template .sty files next to .tex for compilation
      run: |
        shopt -s nullglob
        for sty in cv_builder/templates/*/*.sty; do
          cp "$sty" data/
        done

    - name: Compile LaTeX
      uses: xu-cheng/latex-action@v4
      with:
        root_file: data/*.tex
        work_in_root_file_dir: true
        pre_compile: |
          tlmgr install $(cat latex_requirements.txt | tr '\n' ' ')

    - name: Commit regenerated artifacts to PR branch
      run: |
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        git add data/*.tex data/*.pdf data/cv.jsonresume.json
        if git diff --staged --quiet; then
          echo "No artifact changes to commit."
        else
          git commit -m "ci: rebuild CV artifacts"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
        fi
