version: 2
updates:
  # Python dependencies (Poetry — Dependabot reads pyproject.toml + poetry.lock)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions workflow pins. Group everything into one weekly PR to
  # avoid PR-spam when actions/checkout etc. publish minor releases.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"
    groups:
      actions:
        patterns:
          - "*"
